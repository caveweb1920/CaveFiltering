[network]
interface = eth0                  # change to your public interface

[services]
tcp_ports = 22,25565-25600,80,443
udp_ports = 53

[rate_limits]
syn_per_sec = 100
handshake_per_sec = 5            # Minecraft handshake packets per sec per IP
dns_pps = 50                    # max UDP packets per sec per IP (DNS)
ssh_new_conn_per_sec = 5        # new TCP connections per sec per IP to port 22

[ban]
duration = 3600                  # seconds (0 = permanent)

[dashboard]
bind = 0.0.0.0
port = 5000

[xdp_mode]
# 0 = generic (SKB, works everywhere), 2 = native (driver support)
mode = 0

[network]
interface = eth0
# Ports to protect (comma separated)
tcp_ports = 22,25565-25600,80,443
udp_ports = 53

[rate_limits]
syn_per_sec = 100          # max SYNs per second per IP (global)
handshake_per_sec = 5      # max Minecraft handshake packets per sec per IP

[ban]
duration = 3600            # seconds (0 = permanent)

[dashboard]
bind = 0.0.0.0
port = 5000

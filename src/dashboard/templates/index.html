<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaveFiltering - DDoS Shield</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        :root[data-bs-theme="light"] {
            --bs-body-bg: #f0f2f5;
        }
        .stat-card { border-radius: 1rem; transition: transform .2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .chart-container { height: 200px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="fa-solid fa-shield-haltered me-2"></i>CaveFiltering</a>
            <button class="btn btn-outline-secondary" id="themeToggle">
                <i class="fa-solid fa-moon"></i> <span class="ms-1">Light</span>
            </button>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="card stat-card bg-primary text-white mb-3">
                    <div class="card-body">
                        <h5><i class="fa-solid fa-arrow-down"></i> Inbound</h5>
                        <h2 id="rxSpeed">0 Mbps</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card bg-success text-white mb-3">
                    <div class="card-body">
                        <h5><i class="fa-solid fa-arrow-up"></i> Outbound</h5>
                        <h2 id="txSpeed">0 Mbps</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card bg-info text-white mb-3">
                    <div class="card-body">
                        <h5><i class="fa-solid fa-gauge-high"></i> Ping</h5>
                        <h2 id="pingMs">-- ms</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card bg-danger text-white mb-3">
                    <div class="card-body">
                        <h5><i class="fa-solid fa-ban"></i> Blocked</h5>
                        <h2 id="bannedCount">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-2">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <h5><i class="fa-solid fa-chart-line"></i> Traffic History (Mbps)</h5>
                        <div class="chart-container"><canvas id="trafficChart"></canvas></div>
                    </div>
                </div>
            </div>
        </div>

        <h3 class="mt-4"><i class="fa-solid fa-skull"></i> Blocked IPs</h3>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>IP Address</th>
                        <th>Reason</th>
                        <th>Time</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="banTable"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();
        const ctx = document.getElementById('trafficChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'In (Mbps)', borderColor: '#0d6efd', data: [], fill: false },
                    { label: 'Out (Mbps)', borderColor: '#198754', data: [], fill: false }
                ]
            },
            options: { scales: { y: { beginAtZero: true } } }
        });

        let lastRx=0, lastTx=0, lastTime=Date.now();
        const maxHistory = 30;

        socket.on('stats', (data) => {
            const now = Date.now();
            const dt = (now - lastTime) / 1000;
            const rxMbps = ((data.rx_bytes - lastRx) * 8 / 1e6 / dt).toFixed(2);
            const txMbps = ((data.tx_bytes - lastTx) * 8 / 1e6 / dt).toFixed(2);
            document.getElementById('rxSpeed').textContent = rxMbps + ' Mbps';
            document.getElementById('txSpeed').textContent = txMbps + ' Mbps';
            document.getElementById('pingMs').textContent = data.ping_ms ? data.ping_ms.toFixed(1)+' ms' : 'Timeout';
            document.getElementById('bannedCount').textContent = data.banned_count;

            // Update chart
            const timeLabel = new Date().toLocaleTimeString();
            chart.data.labels.push(timeLabel);
            chart.data.datasets[0].data.push(parseFloat(rxMbps));
            chart.data.datasets[1].data.push(parseFloat(txMbps));
            if (chart.data.labels.length > maxHistory) {
                chart.data.labels.shift();
                chart.data.datasets.forEach(ds => ds.data.shift());
            }
            chart.update();

            lastRx = data.rx_bytes;
            lastTx = data.tx_bytes;
            lastTime = now;

            // Banned IPs table
            const tbody = document.getElementById('banTable');
            tbody.innerHTML = '';
            data.banned.forEach(ban => {
                const date = new Date(ban.info.time * 1000).toLocaleString();
                const row = `<tr>
                    <td><code>${ban.ip}</code></td>
                    <td>${ban.info.reason}</td>
                    <td>${date}</td>
                    <td><button class="btn btn-sm btn-warning" onclick="unban('${ban.ip}')"><i class="fa-solid fa-unlock"></i> Unban</button></td>
                </tr>`;
                tbody.innerHTML += row;
            });
        });

        function unban(ip) {
            fetch('/api/unban', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ip: ip})
            }).then(r => r.json()).then(console.log);
        }

        // Theme toggle
        const html = document.documentElement;
        const toggle = document.getElementById('themeToggle');
        toggle.addEventListener('click', () => {
            const current = html.getAttribute('data-bs-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-bs-theme', next);
            toggle.querySelector('i').className = next==='dark'?'fa-solid fa-moon':'fa-solid fa-sun';
            toggle.querySelector('span').textContent = next==='dark'?'Dark':'Light';
            localStorage.setItem('theme', next);
        });
        const saved = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-bs-theme', saved);
        toggle.querySelector('i').className = saved==='dark'?'fa-solid fa-moon':'fa-solid fa-sun';
        toggle.querySelector('span').textContent = saved==='dark'?'Dark':'Light';
    </script>
</body>
</html>
